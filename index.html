<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NETFLURA</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <img src="assets/Netflura.png" alt="Netflura Logo" class="logo" />
      <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">
        <span class="theme-icon">🌙</span>
      </button>
    </header>

    <main>
      <section class="profile-selector">
        <h1>Quem está assistindo?</h1>

        <ul class="profiles-list">
          <li class="profile-item">
            <button
              type="button"
              class="profile-link"
              data-name="FGL"
              data-img="/assets/Caricatura sorridente.png"
            >
              <figure>
                <img
                  src="assets/Caricatura sorridente.png"
                  alt="Avatar de personagem sorridente"
                />
                <figcaption>FGL</figcaption>
              </figure>
            </button>
          </li>

          <li class="profile-item">
            <button
              type="button"
              class="profile-link"
              data-name="DAN"
              data-img="assets/Caricatura de rosto vibrante.png"
            >
              <figure>
                <img
                  src="assets/Caricatura de rosto vibrante.png"
                  alt="Avatar de personagem vibrante."
                />
                <figcaption>DAN</figcaption>
              </figure>
            </button>
          </li>

          <li class="profile-item">
            <button
              type="button"
              class="profile-link"
              data-name="DEBY"
              data-img="/assets/Caricatura sorriso radiante.png"
            >
              <figure>
                <img
                  src="assets/Caricatura sorriso radiante.png"
                  alt="Avatar de personagem radiante."
                />
                <figcaption>DEL</figcaption>
              </figure>
            </button>
          </li>

          <li class="profile-item">
            <button
              type="button"
              class="profile-link"
              data-name="LUD"
              data-img="/assets/Carica Sorridente.png"
            >
              <figure>
                <img
                  src="assets/Carica Sorridente.png"
                  alt="Avatar de pesonagem sorridente."
                />
                <figcaption>LUD</figcaption>
              </figure>
            </button>
          </li>

          <li class="profile-item">
            <button
              type="button"
              class="profile-link"
              data-name="SCL"
              data-img="assets/Estilizado sorridente.png"
            >
              <figure>
                <img
                  src="assets/Estilizado sorridente.png"
                  alt="Avatar de pesonagem sorridente."
                />
                <figcaption>SCL</figcaption>
              </figure>
            </button>
          </li>

          <li class="profile-item">
            <button
              type="button"
              class="profile-link"
              data-name="ICR"
              data-img="/assets/sorriso largo.png"
            >
              <figure>
                <img
                  src="assets/sorriso largo.png"
                  alt="Avatar de personagem sorriso largo."
                />
                <figcaption>ICR</figcaption>
              </figure>
            </button>
          </li>
        </ul>

        <button class="manage-profiles">Gerenciar perfis</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
