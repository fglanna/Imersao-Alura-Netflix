<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflura - Quem está assistindo?</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <img src="/assets/Netflura.png" alt="Netflura Logo" class="logo" />
      <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">
        <span class="theme-icon">🌙</span>
      </button>
    </header>

    <main>
      <section class="profile-selector">
        <h1>Quem está assistindo?</h1>

        <ul class="profiles-list">
          <li class="profile-item">
            <button type="button" class="profile-link">
              <figure>
                <img
                  src="/assets/perfil-1.jpg"
                  alt="Avatar de personagem gótico em stop-motion com pele roxa,
                 cartola e expressão melancólica, vestindo trajes vitorianos em um cenário sombrio"
                />
                <figcaption>João</figcaption>
              </figure>
            </button>
          </li>

          <li class="profile-item">
            <button type="button" class="profile-link">
              <figure>
                <img src="/assets/perfil-2.jpg" alt="Imagem de um Boné azul." />
                <figcaption>Thiago</figcaption>
              </figure>
            </button>
          </li>

          <li class="profile-item">
            <button type="button" class="profile-link">
              <figure>
                <img
                  src="/assets/perfil-3.jpg"
                  alt="Close de um relógio de bolso antigo, quebrado, com ponteiros parados e vidro rachado, pendurado em uma corrente em uma parede de pedra cinza texturizada."
                />
                <figcaption>Broken watch</figcaption>
              </figure>
            </button>
          </li>

          <li class="profile-item">
            <button type="button" class="profile-link">
              <figure>
                <img
                  src="/assets/perfil-4.jpg"
                  alt="Escultura tátil e antiga de um leão majestoso em pedra escura com olhos dourados brilhantes, em um cenário gótico borrado com ruínas e musgo, similar ao estilo de stop-motion."
                />
                <figcaption>Leon</figcaption>
              </figure>
            </button>
          </li>
        </ul>

        <button class="manage-profiles">Gerenciar perfis</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
